
<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{padding:1.5rem 0;max-width:660px;font-family:var(--font-sans)}
.hdr{display:flex;align-items:flex-start;gap:14px;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.hdr-icon{width:44px;height:44px;border-radius:var(--border-radius-md);background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-icon i{font-size:22px;color:#0F6E56}
.hdr-title{font-size:18px;font-weight:500;color:var(--color-text-primary);line-height:1.4}
.hdr-sub{font-size:14px;color:var(--color-text-secondary);margin-top:3px}
.prog-bar{display:flex;align-items:center;gap:6px;margin-bottom:2rem}
.prog-seg{height:4px;flex:1;border-radius:2px;background:var(--color-border-tertiary);transition:background .3s}
.prog-seg.done{background:#1D9E75}
.prog-seg.cur{background:#378ADD}
.prog-label{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.25rem;font-weight:500}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem;margin-bottom:1rem}
.q-main{font-size:17px;font-weight:500;color:var(--color-text-primary);line-height:1.6;margin-bottom:1rem}
.q-note{font-size:14px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.875rem 1rem;line-height:1.7;margin-bottom:1.25rem}
.q-note strong{color:var(--color-text-primary);font-weight:500}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:10px 22px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:15px;cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--color-background-secondary)}
.btn.yes{border-color:#1D9E75;color:#0F6E56}
.btn.no{border-color:#D85A30;color:#993C1D}
.btn.yes:hover{background:#E1F5EE}
.btn.no:hover{background:#FAECE7}
.btn.pri{border-color:#378ADD;color:#185FA5}
.btn.pri:hover{background:#E6F1FB}
.input-wrap{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.input-wrap label{font-size:15px;color:var(--color-text-secondary)}
.input-wrap input{width:120px;padding:8px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:16px}
.input-wrap .unit{font-size:15px;color:var(--color-text-secondary)}
.notice{border-radius:var(--border-radius-md);padding:1rem 1.25rem;margin-bottom:1.25rem;font-size:15px;line-height:1.7}
.notice.info{background:#E6F1FB;border:0.5px solid #85B7EB;color:#0C447C}
.notice.success{background:#E1F5EE;border:0.5px solid #5DCAA5;color:#085041}
.notice.warn{background:#FAEEDA;border:0.5px solid #EF9F27;color:#633806}
.notice.neutral{background:#F1EFE8;border:0.5px solid #B4B2A9;color:#444441}
.notice strong{font-weight:500}
.exempt-list{display:flex;flex-direction:column;gap:12px;margin-bottom:1.5rem}
.ex-item{display:flex;align-items:flex-start;gap:16px;padding:1rem 1.25rem;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);transition:border-color .15s}
.ex-item.ok{border-color:#5DCAA5;background:#E1F5EE}
.ex-item.ng{border-color:#F09595;background:#FCEBEB}
.ex-icon{width:40px;height:40px;border-radius:50%;border:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--color-background-secondary)}
.ex-icon i{font-size:22px;color:var(--color-text-tertiary)}
.ex-item.ok .ex-icon{background:#E1F5EE;border-color:#5DCAA5}
.ex-item.ok .ex-icon i{color:#0F6E56}
.ex-item.ng .ex-icon{background:#FCEBEB;border-color:#F09595}
.ex-item.ng .ex-icon i{color:#A32D2D}
.ex-body{flex:1;min-width:0}
.ex-num{font-size:12px;color:var(--color-text-tertiary);margin-bottom:3px;font-weight:500}
.ex-text{font-size:15px;color:var(--color-text-primary);line-height:1.6;margin-bottom:10px}
.ex-item.ok .ex-text{color:#085041}
.ex-item.ng .ex-text{color:#791F1F}
.ex-btns{display:flex;gap:8px}
.ex-btn{padding:7px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;cursor:pointer;transition:background .15s}
.ex-btn:hover{background:var(--color-background-secondary)}
.ex-btn.sel-yes{border-color:#1D9E75;background:#E1F5EE;color:#085041;font-weight:500}
.ex-btn.sel-no{border-color:#E24B4A;background:#FCEBEB;color:#791F1F;font-weight:500}
.result-card{border-radius:var(--border-radius-lg);padding:1.75rem;margin-bottom:1rem}
.result-card.exempt{background:#E1F5EE;border:0.5px solid #5DCAA5}
.result-card.apply{background:#E6F1FB;border:0.5px solid #85B7EB}
.result-card.na{background:#F1EFE8;border:0.5px solid #B4B2A9}
.result-card.warn{background:#FAEEDA;border:0.5px solid #EF9F27}
.res-icon{font-size:32px;margin-bottom:.75rem}
.res-icon.exempt{color:#0F6E56}
.res-icon.apply{color:#185FA5}
.res-icon.na{color:#5F5E5A}
.res-icon.warn{color:#854F0B}
.res-title{font-size:19px;font-weight:500;margin-bottom:.5rem}
.res-title.exempt{color:#085041}
.res-title.apply{color:#0C447C}
.res-title.na{color:#444441}
.res-title.warn{color:#633806}
.res-body{font-size:15px;line-height:1.75}
.res-body.exempt{color:#085041}
.res-body.apply{color:#0C447C}
.res-body.na{color:#444441}
.res-body.warn{color:#633806}
.divider{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:1.25rem 0}
.contact-block{font-size:14px;color:var(--color-text-secondary);line-height:1.7}
.contact-block strong{color:var(--color-text-primary);font-size:15px;font-weight:500}
.footer-note{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.875rem 1rem;font-size:13px;color:var(--color-text-secondary);line-height:1.65;margin-bottom:1rem}
.reset-btn{background:none;border:none;color:var(--color-text-secondary);font-size:14px;cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:0}
.reset-btn:hover{color:var(--color-text-primary)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
</style>
<h2 class="sr-only">読谷村土地開発行為 事前セルフチェックツール</h2>
<div class="app">
  <div class="hdr">
    <div class="hdr-icon"><i class="ti ti-map-2" aria-hidden="true"></i></div>
    <div>
      <div class="hdr-title">読谷村 土地開発行為 事前セルフチェック</div>
      <div class="hdr-sub">窓口受付の前に、開発行為の該当・適用除外を自己確認できます</div>
    </div>
  </div>
  <div id="prog" class="prog-bar"></div>
  <div id="main"></div>
</div>
<script>
const S={step:0,area:null,answers:{},exempt:{},resultKey:null};

const EXEMPT=[
  {id:'e1',text:'宅地分譲・分譲住宅・共同住宅で、開発区域周辺の道路・排水・水道の基盤整備が完了している'},
  {id:'e2',text:'開発区域周辺の土地利用との整合性がとれている'},
  {id:'e3',text:'予定建築物の高さが、都市計画法・地区計画・景観計画等の基準以下である'},
  {id:'e4',text:'予定建築物の規模・配置が周辺建物と過密・狭隘になっていない'},
  {id:'e5',text:'予定建築物の壁が隣地境界線から1m以上後退している'},
  {id:'e6',text:'宅地分譲・分譲住宅の各画地規模が1区画150㎡以上（共同住宅は適用外）'},
  {id:'e7',text:'駐車場：宅地分譲・分譲住宅は画地内2台以上、共同住宅等は戸数分以上を設置'},
  {id:'e8',text:'開発区域の各画地を10%以上緑化し、沿道・敷地内緑化に配慮している'},
  {id:'e9',text:'区画変更が3区画以下で公共施設整備を伴わない。崖地でなく切土・盛土が宅地造成規制法の技術基準を満たす。他法令の手続で実施できる'}
];

const RESULTS={
  na1:{cls:'na',icon:'ti-circle-x',title:'開発行為に該当しません',
    body:'土地の区画・形・質の変更を行わない場合は、本条例の開発行為には当たりません。ただし、建築確認・農地転用など他法令の手続が必要な場合があります。'},
  na2:{cls:'na',icon:'ti-circle-x',title:'本条例の対象外です',
    body:'500㎡未満の土地で、土砂採取500㎥以下かつ周囲との高低差1m未満の場合は、条例(2)号の要件を満たさないため開発許可は不要です。念のため都市計画課窓口にご相談ください。'},
  over3000:{cls:'na',icon:'ti-arrow-right',title:'都市計画法等の手続を確認してください',
    body:'3,000㎡以上の開発行為は本条例の対象外となります。都市計画法（沖縄県）の開発許可その他関係法令の手続が必要な場合があります。関係各課にご確認ください。'},
  exempt:{cls:'exempt',icon:'ti-circle-check',title:'適用除外の可能性があります',
    body:'全ての基準に該当する場合、開発許可の本申請は不要です。「開発適用除外確認届出書（第12号様式）」を準備のうえ、都市計画課窓口にお越しください。最終判断は村長（都市計画課）が行います。'},
  apply:{cls:'apply',icon:'ti-file-description',title:'開発許可の本申請が必要です',
    body:'適用除外の基準を満たさない項目があるため、開発許可の本申請が必要です。事前調整用資料・チェックシートを準備のうえ、都市計画課窓口にてご相談ください。'},
  apply_direct:{cls:'apply',icon:'ti-file-description',title:'開発許可の本申請が必要です',
    body:'開発行為として開発許可の本申請が必要です。事前調整用の資料作成要領・チェックシートを準備のうえ、都市計画課窓口にてご相談ください。'}
};

function dots(){
  const total=5;
  let h='';
  for(let i=0;i<total;i++){
    let c='prog-seg';
    if(i<S.step)c+=' done';
    else if(i===S.step)c+=' cur';
    h+=`<div class="${c}"></div>`;
  }
  document.getElementById('prog').innerHTML=h;
}

function render(){
  dots();
  const m=document.getElementById('main');
  if(S.step===0)renderS0(m);
  else if(S.step===1)renderS1(m);
  else if(S.step===2)renderS2(m);
  else if(S.step===3)renderS3(m);
  else if(S.step===4)renderResult(m);
}

function renderS0(m){
  m.innerHTML=`
  <div class="prog-label">ステップ 1 / 5 ー 開発行為の有無</div>
  <div class="card">
    <div class="q-main">土地の区画・形・質の変更を行いますか？</div>
    <div class="q-note">
      以下のいずれかに該当する場合は「はい」を選択してください。<br>
      <strong>区画の変更</strong>：土地の分割・合筆など区画を変更する<br>
      <strong>形の変更</strong>：切土・盛土により土地の形状を変更する<br>
      <strong>質の変更</strong>：農地等を宅地・その他用途に転換する<br>
      ※分筆のみで土地利用形態に変更がなければ該当しません
    </div>
    <div class="btn-row">
      <button class="btn yes" onclick="go0(true)"><i class="ti ti-check" aria-hidden="true"></i>はい（変更あり）</button>
      <button class="btn no" onclick="go0(false)"><i class="ti ti-x" aria-hidden="true"></i>いいえ（変更なし）</button>
    </div>
  </div>`;
}

function go0(v){if(!v){showResult('na1');}else{S.step=1;render();}}

function renderS1(m){
  m.innerHTML=`
  <div class="prog-label">ステップ 2 / 5 ー 土地の面積</div>
  <div class="card">
    <div class="q-main">開発対象となる「一団の土地」の合計面積を入力してください</div>
    <div class="q-note">一団の土地とは：登記上の筆数を問わず、土地利用上一体として扱われるひとまとまりの土地です。</div>
    <div class="input-wrap">
      <label for="ai">面積</label>
      <input type="number" id="ai" min="1" step="1" autofocus>
      <span class="unit">㎡</span>
    </div>
    <div class="btn-row">
      <button class="btn pri" onclick="go1()"><i class="ti ti-arrow-right" aria-hidden="true"></i>次へ</button>
    </div>
  </div>
  <button class="reset-btn" onclick="reset()">最初からやり直す</button>`;
}

function go1(){
  const v=parseFloat(document.getElementById('ai').value);
  if(isNaN(v)||v<=0){alert('正の数値を入力してください');return;}
  S.area=v;S.step=2;render();
}

function renderS2(m){
  const a=S.area;
  let notice='';
  let btns='';
  if(a>=500&&a<3000){
    notice=`<div class="notice info"><strong>条例(1)号に該当：500㎡以上3,000㎡未満の一団の土地の開発行為</strong><br>開発行為として申請が必要です。引き続き適用除外の基準を確認します。</div>`;
    btns=`<div class="btn-row">
      <button class="btn pri" onclick="S.step=3;render()"><i class="ti ti-clipboard-check" aria-hidden="true"></i>適用除外の基準を確認する</button>
      <button class="btn" onclick="showResult('apply_direct')">適用除外の確認は不要（本申請へ）</button>
    </div>`;
  }else if(a<500){
    notice=`<div class="notice warn"><strong>面積が500㎡未満のため、追加条件を確認します（条例(2)号）</strong></div>
    <div class="q-note">以下のいずれかに該当しますか？<br>
    ① 土砂等の採取量が <strong>500立方メートルを超える</strong><br>
    ② 周囲隣接地との1箇所において <strong>高低差が1m以上</strong> 生じる</div>`;
    btns=`<div class="btn-row">
      <button class="btn yes" onclick="S.step=3;render()">いずれかに該当する</button>
      <button class="btn no" onclick="showResult('na2')">どちらも該当しない</button>
    </div>`;
  }else{
    notice=`<div class="notice neutral"><strong>面積が3,000㎡以上のため、本条例の対象外です</strong><br>都市計画法（沖縄県）など他法令の手続をご確認ください。</div>`;
    btns=`<div class="btn-row"><button class="btn" onclick="showResult('over3000')">確認する</button></div>`;
  }
  m.innerHTML=`
  <div class="prog-label">ステップ 3 / 5 ー 条号の判定（面積：${a.toLocaleString()} ㎡）</div>
  <div class="card">${notice}${btns}</div>
  <button class="reset-btn" onclick="reset()">最初からやり直す</button>`;
}

function renderS3(m){
  const checks=S.exempt;
  const allYes=EXEMPT.every(it=>checks[it.id]===true);
  const anyNo=EXEMPT.some(it=>checks[it.id]===false);
  const allAnswered=EXEMPT.every(it=>checks[it.id]!==undefined);

  let items='';
  EXEMPT.forEach((it,i)=>{
    const v=checks[it.id];
    const cls=v===true?'ok':v===false?'ng':'';
    const iconName=v===true?'ti-circle-check':v===false?'ti-circle-x':'ti-circle';
    items+=`<div class="ex-item ${cls}" id="ei_${it.id}">
      <div class="ex-icon"><i class="ti ${iconName}" aria-hidden="true"></i></div>
      <div class="ex-body">
        <div class="ex-num">項目 ${i+1}</div>
        <div class="ex-text">${it.text}</div>
        <div class="ex-btns">
          <button class="ex-btn ${v===true?'sel-yes':''}" onclick="setEx('${it.id}',true)"><i class="ti ti-check" aria-hidden="true" style="font-size:13px"></i> 該当する</button>
          <button class="ex-btn ${v===false?'sel-no':''}" onclick="setEx('${it.id}',false)"><i class="ti ti-x" aria-hidden="true" style="font-size:13px"></i> 該当しない</button>
        </div>
      </div>
    </div>`;
  });

  let bottom='';
  if(allYes){
    bottom=`<div class="notice success"><strong>全9項目に該当しました。適用除外の可能性があります。</strong></div>
    <div class="btn-row"><button class="btn yes" onclick="showResult('exempt')"><i class="ti ti-arrow-right" aria-hidden="true"></i>結果を見る</button></div>`;
  }else if(anyNo){
    bottom=`<div class="notice warn"><strong>非該当の項目があります。本申請が必要です。</strong></div>
    <div class="btn-row"><button class="btn pri" onclick="showResult('apply')"><i class="ti ti-arrow-right" aria-hidden="true"></i>結果を見る</button></div>`;
  }else if(allAnswered){
    bottom=`<div class="btn-row"><button class="btn pri" onclick="showResult('exempt')"><i class="ti ti-arrow-right" aria-hidden="true"></i>結果を見る</button></div>`;
  }

  m.innerHTML=`
  <div class="prog-label">ステップ 4 / 5 ー 開発適用除外の基準（全9項目）</div>
  <div class="card">
    <div class="q-main" style="margin-bottom:1.25rem">全ての項目に該当する場合、開発許可の適用除外となります</div>
    <div class="exempt-list">${items}</div>
    ${bottom}
  </div>
  <button class="reset-btn" onclick="reset()">最初からやり直す</button>`;
}

function setEx(id,v){
  S.exempt[id]=v;
  renderS3(document.getElementById('main'));
}

function showResult(key){
  S.resultKey=key;S.step=4;render();
}

function renderResult(m){
  const r=RESULTS[S.resultKey]||RESULTS['na1'];
  const checks=S.exempt;
  let summary='';
  if(S.resultKey==='exempt'||S.resultKey==='apply'){
    const items=EXEMPT.map((it,i)=>{
      const v=checks[it.id];
      const cls=v===true?'ok':v===false?'ng':'';
      const icon=v===true?'ti-circle-check':v===false?'ti-circle-x':'ti-circle';
      const label=v===true?'該当':'非該当';
      return `<div class="ex-item ${cls}" style="padding:.75rem 1rem">
        <div class="ex-icon"><i class="ti ${icon}" aria-hidden="true"></i></div>
        <div class="ex-body">
          <div class="ex-num">項目 ${i+1}</div>
          <div class="ex-text" style="font-size:14px;margin-bottom:0">${it.text.split('（')[0]} — <strong>${label}</strong></div>
        </div>
      </div>`;
    }).join('');
    summary=`<div class="divider"></div><p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:.75rem;font-weight:500">適用除外チェック結果</p><div class="exempt-list" style="gap:8px">${items}</div>`;
  }

  let contact='';
  if(r.cls!=='na'||S.resultKey==='over3000'){
    contact=`<div class="divider"></div>
    <div class="contact-block">
      <strong>読谷村役場 都市計画課</strong><br>
      〒904-0392 沖縄県中頭郡読谷村字座喜味2901番地1<br>
      電話：098-982-9220　受付：平日 8:30〜12:00 / 13:00〜17:15
    </div>`;
  }

  m.innerHTML=`
  <div class="prog-label">ステップ 5 / 5 ー 結果</div>
  <div class="result-card ${r.cls}">
    <div class="res-icon ${r.cls}"><i class="ti ${r.icon}" aria-hidden="true"></i></div>
    <div class="res-title ${r.cls}">${r.title}</div>
    <div class="res-body ${r.cls}">${r.body}</div>
    ${summary}
    ${contact}
  </div>
  <div class="footer-note">
    <i class="ti ti-info-circle" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:4px"></i>
    このチェック結果は参考情報です。最終的な判断は読谷村都市計画課が行います。鉱物採掘（条例第(3)号）・特殊事例は窓口へ直接ご相談ください。令和7年4月1日施行の改正規則に基づいています。
  </div>
  <button class="reset-btn" onclick="reset()">最初からやり直す</button>`;
}

function reset(){
  S.step=0;S.area=null;S.answers={};S.exempt={};S.resultKey=null;render();
}

render();
</script>
